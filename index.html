<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtualis d.o.o.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgb(31, 35, 38);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        img {
            height: 80px;
            border-radius: 12px;
            margin-bottom: 40px;
        }



        a {
            color: #666;
            font-size: 0.85rem;
            text-decoration: none;
            margin-top: 24px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        a:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <img src="logo.png" alt="Virtualis">
    <a href="mailto:info@virtualis.hr">info@virtualis.hr</a>
</body>

</html>
