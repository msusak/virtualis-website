<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtualis d.o.o.</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #202020;
            /* Changed from #1a1a1a to #202020 */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        img {
            height: 120px;
            /* Changed from 80px to 120px */
            margin-bottom: 32px;
            clip-path: inset(14% 3% 14% 3% round 14px);
            /* Added clip-path */
        }

        p {
            color: #888;
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <img src="logo.png" alt="Virtualis">
    <p>Coming Soon</p>
</body>

</html>
